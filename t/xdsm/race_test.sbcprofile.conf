enable_auth=no
next_hop=127.0.0.1:5070
next_hop_fixed=yes
call_control=xdsm
xdsm_module=cc_dsm
xdsm_start_diag=race_test
xdsm_app_bundle=race_test

# mimic a whitelist header filter that does NOT include P-Force-491, so the
# header is stripped from B2B-relayed requests - exactly how the MT#65396
# incident lost it on NGCP's production ngcp.sbcprofile.conf
header_filter=whitelist
header_list=Allow,Supported,User-Agent,Content-Disposition
